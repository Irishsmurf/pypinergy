name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --cov=pypinergy --cov-report=xml

      - name: Run network integration tests
        run: python -m pytest tests/integration/ -m network -v

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration tests (Python 3.12)
    runs-on: ubuntu-latest
    needs: test
    # Only run on pushes to main — PRs from forks won't have secrets
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v
        env:
          PINERGY_EMAIL: ${{ secrets.PINERGY_EMAIL }}
          PINERGY_PASSWORD: ${{ secrets.PINERGY_PASSWORD }}
